/health:
  get:
    summary: Health check endpoint
    description: Returns service health status (alive), even if degraded.
    operationId: getHealth
    tags: [Health]
    security: []
    responses:
      '200':
        description: Service is alive (ok or degraded)
        content:
          application/json:
            schema:
              $ref: '../components/schemas/health.yaml#/HealthResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/health.yaml#/HealthErrorResponse'

/ready:
  get:
    summary: Readiness probe
    description: Checks if the application is ready to accept traffic.
    operationId: getReady
    tags: [Health]
    security: []
    responses:
      '200':
        description: Ready
        content:
          application/json:
            schema:
              $ref: '../components/schemas/health.yaml#/ReadyResponse'
      '503':
        description: Not ready
        content:
          application/json:
            schema:
              $ref: '../components/schemas/health.yaml#/NotReadyResponse'

/version:
  get:
    summary: Version information
    description: Returns service version information.
    operationId: getVersion
    tags: [Health]
    security: []
    responses:
      '200':
        description: Version info
        content:
          application/json:
            schema:
              $ref: '../components/schemas/health.yaml#/VersionResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/health.yaml#/VersionErrorResponse'
