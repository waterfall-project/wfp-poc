/health:
  get:
    summary: Health check endpoint
    description: Returns service health status (alive), even if degraded.
    operationId: getHealth
    tags: [Health]
    security: []
    responses:
      '200':
        description: Service is alive (ok or degraded)
        content:
          application/json:
            schema:
              type: object
              required: [status, timestamp, checks]
              properties:
                status:
                  type: string
                  enum: [ok, degraded]
                timestamp:
                  type: string
                  format: date-time
                checks:
                  type: object
                  required: [database]
                  properties:
                    database:
                      type: object
                      required: [status, response_time_ms]
                      properties:
                        status:
                          type: string
                          enum: [ok, error]
                        response_time_ms:
                          type: integer
                          minimum: 0
                        error:
                          type: string
                          description: Error details when status=error
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              type: object
              required: [status, timestamp, error]
              properties:
                status:
                  type: string
                  enum: [error]
                timestamp:
                  type: string
                  format: date-time
                error:
                  type: string

/ready:
  get:
    summary: Readiness probe
    description: Checks if the application is ready to accept traffic.
    operationId: getReady
    tags: [Health]
    security: []
    responses:
      '200':
        description: Ready
        content:
          application/json:
            schema:
              type: object
              required: [status, timestamp, checks]
              properties:
                status:
                  type: string
                  enum: [ready]
                timestamp:
                  type: string
                  format: date-time
                checks:
                  type: object
                  additionalProperties:
                    type: object
                    required: [status, response_time_ms]
                    properties:
                      status:
                        type: string
                        enum: [ok, error]
                      response_time_ms:
                        type: integer
                        minimum: 0
                      error:
                        type: string
                        description: Error details when status=error
      '503':
        description: Not ready
        content:
          application/json:
            schema:
              type: object
              required: [status, timestamp, checks]
              properties:
                status:
                  type: string
                  enum: [not_ready]
                timestamp:
                  type: string
                  format: date-time
                checks:
                  type: object
                  additionalProperties:
                    type: object
                    required: [status, response_time_ms]
                    properties:
                      status:
                        type: string
                        enum: [ok, error]
                      response_time_ms:
                        type: integer
                        minimum: 0
                      error:
                        type: string
                        description: Error details when status=error

/version:
  get:
    summary: Version information
    description: Returns service version information.
    operationId: getVersion
    tags: [Health]
    security: []
    responses:
      '200':
        description: Version info
        content:
          application/json:
            schema:
              type: object
              required: [version, git_commit, build_date, environment]
              properties:
                version:
                  type: string
                git_commit:
                  type: string
                build_date:
                  type: string
                  format: date-time
                environment:
                  type: string
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              type: object
              required: [error, timestamp]
              properties:
                error:
                  type: string
                timestamp:
                  type: string
                  format: date-time
