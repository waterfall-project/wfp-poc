/{version}/projects/{project_id}/progress:
  post:
    summary: Bulk update task progress
    description: |
      Bulk update percent_complete for multiple tasks on a given reporting date.
      Automatically updates task status (0=not_started, 1-99=in_progress, 100=completed)
      and records history entries for trend analysis. Partial success is allowed.
    operationId: updateProjectProgress
    tags: [Progress]
    security:
      - bearerAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/VersionParam'
      - $ref: '../components/parameters.yaml#/ProjectIdPathParam'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/progress.yaml#/ProgressUpdateRequest'
          example:
            date: "2026-01-10T10:00:00Z"
            updates:
              - task_id: "8b0f5a1c-5b68-4b15-9b7c-1234567890ab"
                percent_complete: 75
                comment: "Design phase completed"
              - task_id: "4f9e2c3d-6a7b-4c5d-8e9f-abcdef012345"
                percent_complete: 100
                comment: "Testing completed"
    responses:
      '200':
        description: Progress updated
        content:
          application/json:
            schema:
              $ref: '../components/schemas/progress.yaml#/ProgressUpdateResponse'
            example:
              data:
                project_id: "a1b2c3d4-e5f6-4a5b-8c9d-0e1f2a3b4c5d"
                date: "2026-01-10T10:00:00Z"
                updated_count: 2
                failed_count: 0
                updates:
                  - task_id: "8b0f5a1c-5b68-4b15-9b7c-1234567890ab"
                    task_name: "Design Phase"
                    previous_percent_complete: 50
                    new_percent_complete: 75
                    status_changed: true
                    new_status: "in_progress"
                  - task_id: "4f9e2c3d-6a7b-4c5d-8e9f-abcdef012345"
                    task_name: "Testing"
                    previous_percent_complete: 90
                    new_percent_complete: 100
                    status_changed: true
                    new_status: "completed"
                errors: []
              message: "Progress updated successfully"
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '422':
        $ref: '../components/responses.yaml#/UnprocessableEntity'
      '429':
        $ref: '../components/responses.yaml#/TooManyRequests'
      '500':
        $ref: '../components/responses.yaml#/InternalServerError'

/{version}/projects/{project_id}/progress/history:
  get:
    summary: Get progress history
    description: Retrieve progress update history for a project, optionally filtered by task and date range.
    operationId: getProgressHistory
    tags: [Progress]
    security:
      - bearerAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/VersionParam'
      - $ref: '../components/parameters.yaml#/ProjectIdPathParam'
      - name: task_id
        in: query
        required: false
        description: Filter by task identifier
        schema:
          type: string
          format: uuid
      - name: start_date
        in: query
        required: false
        description: Start of date range filter (inclusive)
        schema:
          type: string
          format: date-time
      - name: end_date
        in: query
        required: false
        description: End of date range filter (inclusive)
        schema:
          type: string
          format: date-time
      - $ref: '../components/parameters.yaml#/PageParam'
      - $ref: '../components/parameters.yaml#/PerPageParam'
      - $ref: '../components/parameters.yaml#/SortOrderParam'
    responses:
      '200':
        description: Progress history
        content:
          application/json:
            schema:
              $ref: '../components/schemas/progress.yaml#/ProgressHistoryResponse'
            example:
              data:
                - id: "11111111-2222-3333-4444-555555555555"
                  project_id: "a1b2c3d4-e5f6-4a5b-8c9d-0e1f2a3b4c5d"
                  task_id: "8b0f5a1c-5b68-4b15-9b7c-1234567890ab"
                  task_name: "Design Phase"
                  date: "2026-01-10T10:00:00Z"
                  previous_percent_complete: 50
                  new_percent_complete: 75
                  delta: 25
                  comment: "Design phase completed"
                  updated_by: "77777777-8888-9999-aaaa-bbbbbbbbbbbb"
                  created_at: "2026-01-10T10:05:00Z"
                - id: "66666666-7777-8888-9999-000000000000"
                  project_id: "a1b2c3d4-e5f6-4a5b-8c9d-0e1f2a3b4c5d"
                  task_id: "4f9e2c3d-6a7b-4c5d-8e9f-abcdef012345"
                  task_name: "Testing"
                  date: "2026-01-10T10:00:00Z"
                  previous_percent_complete: 90
                  new_percent_complete: 100
                  delta: 10
                  comment: "Testing completed"
                  updated_by: "77777777-8888-9999-aaaa-bbbbbbbbbbbb"
                  created_at: "2026-01-10T10:05:00Z"
              page: 1
              per_page: 20
              total: 156
              total_pages: 8
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '429':
        $ref: '../components/responses.yaml#/TooManyRequests'
      '500':
        $ref: '../components/responses.yaml#/InternalServerError'
