          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token obtained from Identity service authentication endpoint.
        Include in Authorization header as: Bearer <token>

        Required claims: user_id, company_id, email

        Guardian permissions required:
        - Service: wfp-poc
        - Operations: READ, CREATE, UPDATE, DELETE
        - Context: {company_id: <uuid>, project_id: <uuid>}
    metricsAuth:
      type: http
      scheme: bearer
      bearerFormat: APIKey
      description: |
        Metrics endpoint API key.
        Include in Authorization header as: Bearer <METRICS_API_KEY>
  parameters:
    VersionParam:
      name: version
      in: path
      required: true
      description: API version
      schema:
        type: string
        enum:
          - v0
          - v1
        default: v0
    PageParam:
      name: page
      in: query
      description: Page number for pagination
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPageParam:
      name: per_page
      in: query
      description: Items per page
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ProjectIdParam:
      name: id
      in: path
      required: true
      description: Project unique identifier
      schema:
        type: string
        format: uuid
      example: a1b2c3d4-e5f6-4a5b-8c9d-0e1f2a3b4c5d
    ProjectIdPathParam:
      name: project_id
      in: path
      required: true
      description: Project unique identifier
      schema:
        type: string
        format: uuid
      example: a1b2c3d4-e5f6-4a5b-8c9d-0e1f2a3b4c5d
    ProjectIdQueryParam:
      name: project_id
      in: path
      required: true
      deprecated: true
      description: Deprecated (misnamed). Use ProjectIdPathParam.
      schema:
        type: string
        format: uuid
      example: a1b2c3d4-e5f6-4a5b-8c9d-0e1f2a3b4c5d
    TaskIdParam:
      name: id
      in: path
      required: true
      description: Task unique identifier
      schema:
        type: string
        format: uuid
    MilestoneIdParam:
      name: id
      in: path
      required: true
      description: Milestone unique identifier
      schema:
        type: string
        format: uuid
    MilestoneIdPathParam:
      name: milestone_id
      in: path
      required: true
      description: Milestone unique identifier
      schema:
        type: string
        format: uuid
    ResourceIdParam:
      name: id
      in: path
      required: true
      description: Resource unique identifier
      schema:
        type: string
        format: uuid
    AssignmentIdParam:
      name: id
      in: path
      required: true
      description: Assignment unique identifier
      schema:
        type: string
        format: uuid
    ExpenseIdParam:
      name: id
      in: path
      required: true
      description: Expense unique identifier
      schema:
        type: string
        format: uuid
    SearchParam:
      name: search
      in: query
      description: Search term for filtering
      required: false
      schema:
        type: string
    SortByParam:
      name: sort_by
      in: query
      description: Field to sort by
      required: false
      schema:
        type: string
    SortOrderParam:
      name: sort_order
      in: query
      description: Sort direction
      required: false
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
  responses:
    BadRequest:
      description: Invalid request parameters or body
      headers:
        X-Correlation-ID:
          schema:
            type: string
          description: Correlation ID for tracing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Validation failed
            errors:
              start_date:
                - Start date must be before finish date
    Unauthorized:
      description: Authentication required or invalid token
      headers:
        X-Correlation-ID:
          schema:
            type: string
          description: Correlation ID for tracing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Invalid or expired token
    Forbidden:
      description: Insufficient permissions
      headers:
        X-Correlation-ID:
          schema:
            type: string
          description: Correlation ID for tracing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Insufficient Guardian permissions for this operation
    NotFound:
      description: Resource not found
      headers:
        X-Correlation-ID:
          schema:
            type: string
          description: Correlation ID for tracing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Resource not found
    UnprocessableEntity:
      description: Business logic error
      headers:
        X-Correlation-ID:
          schema:
            type: string
          description: Correlation ID for tracing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Start date must be before finish date
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        X-Correlation-ID:
          schema:
            type: string
          description: Correlation ID for tracing
        Retry-After:
          schema:
            type: integer
          description: Seconds until rate limit resets
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Unix timestamp when rate limit resets
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Rate limit exceeded. Maximum 10 requests per minute.
    InternalServerError:
      description: Internal server error
      headers:
        X-Correlation-ID:
          schema:
            type: string
          description: Correlation ID for tracing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: An unexpected error occurred
            correlation_id: 123e4567-e89b-12d3-a456-426614174000
  schemas:
    Project:
      type: object
      required:
        - id
        - company_id
        - name
        - start_date
        - finish_date
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier (UUID v4), auto-generated
          readOnly: true
        company_id:
          type: string
          format: uuid
          description: Tenant identifier for multi-tenant isolation
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Project name
        code:
          anyOf:
            - type: string
            - type: 'null'
          maxLength: 50
          description: Project code or identifier (e.g., G.PRJ.12345)
        title:
          anyOf:
            - type: string
            - type: 'null'
          maxLength: 255
          description: MS Project Title field
        description:
          anyOf:
            - type: string
            - type: 'null'
          maxLength: 2000
          description: Project description
        start_date:
          type: string
          format: date-time
          description: Project start date (ISO 8601)
        planned_start_date:
          anyOf:
            - type: string
            - type: 'null'
          format: date-time
          deprecated: true
          description: Alias for start_date (ERD terminology)
        finish_date:
          type: string
          format: date-time
          description: Project finish date (ISO 8601)
        planned_finish_date:
          anyOf:
            - type: string
            - type: 'null'
          format: date-time
          deprecated: true
          description: Alias for finish_date (ERD terminology)
        budget:
          anyOf:
            - type: number
            - type: 'null'
          format: decimal
          minimum: 0
          description: Total project budget (BAC)
        currency_code:
          type: string
          maxLength: 3
          default: EUR
          description: ISO 4217 currency code
        status:
          type: string
          enum:
            - initialized
            - active
            - completed
            - cancelled
            - on_hold
          default: initialized
          description: Project status
        ms_project_uid:
          anyOf:
            - type: string
            - type: 'null'
          description: MS Project UID (import reconciliation key)
        ms_project_guid:
          anyOf:
            - type: string
            - type: 'null'
          maxLength: 50
          description: MS Project GUID for round-trip compatibility
        ms_project_save_version:
          anyOf:
            - type: integer
            - type: 'null'
          description: MS Project SaveVersion field
        creation_date:
          anyOf:
            - type: string
            - type: 'null'
          format: date-time
          description: Original MS Project creation date
        last_saved_date:
          anyOf:
            - type: string
            - type: 'null'
          format: date-time
          description: MS Project last saved date
        calendar_uid:
          anyOf:
            - type: integer
            - type: 'null'
          description: MS Project calendar UID
        minutes_per_day:
          type: integer
          default: 420
          description: Working minutes per day (420 = 7 hours)
        minutes_per_week:
          type: integer
          default: 2100
          description: Working minutes per week (2100 = 35 hours)
        days_per_month:
          type: integer
          default: 20
          description: Working days per month
        week_start_day:
          type: integer
          default: 1
          description: First day of week (0=Sunday, 1=Monday)
        default_start_time:
          type: string
          pattern: ^\d{2}:\d{2}:\d{2}$
          default: '09:00:00'
          description: Default task start time (HH:MM:SS)
        default_finish_time:
          type: string
          pattern: ^\d{2}:\d{2}:\d{2}$
          default: '18:00:00'
          description: Default task finish time (HH:MM:SS)
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp
          readOnly: true
        updated_at:
          type: string
          format: date-time
          description: Record last update timestamp
          readOnly: true
      example:
        id: a1b2c3d4-e5f6-4a5b-8c9d-0e1f2a3b4c5d
