          type: string
          enum:
            - upcoming
            - achieved
            - missed
          default: upcoming
          description: Milestone status (auto-updated based on actual_date vs target_date)
          example: upcoming
        budget_weight:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Weight for EV milestone calculation (sum across project must equal 1.0)
          example: 0.15
        is_achieved:
          type: boolean
          default: false
          description: True if milestone has been achieved
        achieved_date:
