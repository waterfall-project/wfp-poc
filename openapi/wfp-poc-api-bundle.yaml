                data:
                  project_id: a1b2c3d4-e5f6-4a5b-8c9d-0e1f2a3b4c5d
                  start_date: '2024-11-01T00:00:00Z'
                  end_date: '2026-01-31T23:59:59Z'
                  cumulative: false
                  monthly_data:
                    - month: 2024-11
                      total: 48000
