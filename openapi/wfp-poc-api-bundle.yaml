openapi: 3.1.0
info:
  title: WFP-POC - Project Management & EVM API
  version: '1.0'
  description: |
    The **wfp-poc** service is a proof-of-concept microservice that provides comprehensive
    project management and Earned Value Management (EVM) capabilities for the Waterfall suite.

    This service enables:
    - **Project planning data** imported from Microsoft Project XML files
    - **Financial tracking** imported from ERP Excel exports
    - **EVM indicators** calculated and exposed for dashboard visualization
    - **Performance forecasts** using multiple projection methods

    **Architecture Position:**
    - **Upstream**: Consumes data from `poc-import` service
    - **Downstream**: Provides data to `poc-export` service and frontend
    - **Standalone**: Exposes REST API for direct CRUD operations
  contact:
    name: Waterfall Project Team
  license:
    name: Commercial License
    url: https://github.com/waterfall/wfp-poc/blob/main/COMMERCIAL-LICENSE.txt
servers:
  - url: https://wfp-poc.waterfall-services.io
    description: Production API
  - url: https://staging-wfp-poc.waterfall-services.io
    description: Staging API
  - url: http://127.0.0.1:5000
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Health
    description: Health check endpoints
  - name: Metrics
    description: Prometheus metrics endpoint
  - name: Projects
    description: Project management operations (CRUD, bulk import)
  - name: Tasks
    description: Task management with WBS hierarchy and predecessor relationships
  - name: Milestones
    description: Milestone tracking and deliverable management
  - name: Resources
    description: Resource management (labor, material, cost) - company-scoped
  - name: Assignments
    description: Task-resource assignments with work hours and cost tracking
  - name: Expenses
    description: Expense tracking with ERP integration (labor, procurement, subcontracting, overhead)
  - name: RAE
    description: RAE (Reste À Engager) tracking for milestone cost estimates
  - name: EVM
    description: Earned Value Management calculations and indicators
  - name: Statistics
    description: Reporting endpoints for chart visualization
  - name: Progress
    description: Task progress updates and history
paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns service health status (alive), even if degraded.
      operationId: getHealth
      tags:
        - Health
      security: []
      responses:
        '200':
          description: Service is alive (ok or degraded)
          headers:
            Cache-Control:
              schema:
                type: string
              example: no-cache, no-store, must-revalidate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: Internal server error
          headers:
            Cache-Control:
              schema:
                type: string
              example: no-cache, no-store, must-revalidate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthErrorResponse'
  /ready:
    get:
      summary: Readiness probe
      description: Checks if the application is ready to accept traffic.
      operationId: getReady
      tags:
        - Health
      security: []
      responses:
        '200':
          description: Ready
          headers:
            Cache-Control:
              schema:
                type: string
              example: no-cache, no-store, must-revalidate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Not ready
          headers:
            Cache-Control:
              schema:
                type: string
              example: no-cache, no-store, must-revalidate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotReadyResponse'
  /version:
    get:
      summary: Version information
      description: Returns service version information.
      operationId: getVersion
      tags:
        - Health
      security: []
      responses:
        '200':
          description: Version info
          headers:
            Cache-Control:
              schema:
                type: string
              example: public, max-age=3600
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
        '500':
          description: Internal server error
          headers:
            Cache-Control:
              schema:
                type: string
              example: public, max-age=3600
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionErrorResponse'
  /metrics:
    get:
      summary: Prometheus metrics endpoint
      description: Exposes application metrics in Prometheus text exposition format.
      operationId: getMetrics
      tags:
        - Metrics
      security:
        - metricsAuth: []
      responses:
        '200':
          description: Prometheus metrics
          headers:
            Cache-Control:
              schema:
                type: string
              example: no-cache, no-store, must-revalidate
          content:
            text/plain; version=0.0.4; charset=utf-8:
              schema:
                type: string
              examples:
                prometheus:
                  summary: Example metrics payload
                  value: |
                    # HELP python_info Python platform information
                    # TYPE python_info gauge
                    python_info{implementation="CPython",major="3",minor="11",patchlevel="7",version="3.11.7"} 1.0
        '401':
          description: Missing or invalid API key
          headers:
            Cache-Control:
              schema:
                type: string
              example: no-cache, no-store, must-revalidate
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - timestamp
                properties:
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
              examples:
                missing:
                  value:
                    message: Missing Authorization header
                    timestamp: '2026-01-07T10:30:00Z'
                invalid:
                  value:
                    message: Invalid API key
                    timestamp: '2026-01-07T10:30:00Z'
        '429':
          description: Rate limit exceeded
          headers:
            Cache-Control:
              schema:
                type: string
              example: no-cache, no-store, must-revalidate
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - retry_after
                properties:
                  message:
                    type: string
                  retry_after:
                    type: integer
                    minimum: 0
              examples:
                rate_limited:
                  value:
                    message: 'Rate limit exceeded: 10 per minute'
                    retry_after: 45
        '500':
          $ref: '#/components/responses/InternalServerError'
  /{version}/projects:
    get:
      summary: List projects
      description: Retrieve paginated list of projects for the authenticated user's company
      operationId: listProjects
      tags:
        - Projects
      parameters:
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: status
          in: query
          description: Filter by project status
          schema:
            type: string
            enum:
              - initialized
              - active
              - completed
              - cancelled
              - on_hold
        - name: start_date_from
          in: query
          description: Filter projects starting after this date
          schema:
            type: string
            format: date-time
        - name: start_date_to
          in: query
          description: Filter projects starting before this date
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          description: Search in name, code, title fields
          schema:
            type: string
        - name: sort_by
          in: query
          description: Field to sort by
          schema:
            type: string
            enum:
              - name
              - code
              - start_date
              - created_at
            default: created_at
        - name: sort_order
          in: query
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        '200':
          description: Successful response with paginated project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create project
      description: Create a new project for the authenticated user's company
      operationId: createProject
      tags:
        - Projects
      parameters:
        - $ref: '#/components/parameters/VersionParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreate'
            examples:
              default:
                summary: Example project creation
                value:
                  name: Enterprise Modernization Project 2025
                  code: G.PRJ.12345
                  title: Infrastructure Upgrade
                  start_date: '2024-11-25T09:00:00Z'
                  finish_date: '2027-02-19T18:00:00Z'
                  budget: 1500000
                  currency_code: EUR
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Project code already exists
          headers:
            X-Correlation-ID:
              schema:
                type: string
              description: Correlation ID for tracing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Project with code 'G.PRJ.12345' already exists for this company
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /{version}/projects/{id}:
    get:
      summary: Get project
      description: Retrieve a single project by ID
      operationId: getProject
      tags:
        - Projects
      parameters:
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '200':
          description: Successful response with project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: Update project
      description: Update an existing project (partial update)
      operationId: updateProject
      tags:
        - Projects
      parameters:
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/ProjectIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdate'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete project
      description: |
        Delete a project only if it has no related entities (tasks, milestones, expenses, assignments, resources).
        If related data exists, the deletion is blocked with a 409 Conflict.
      operationId: deleteProject
      tags:
        - Projects
      parameters:
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '204':
          description: Project deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Project cannot be deleted because related data exists
          headers:
            X-Correlation-ID:
              schema:
                type: string
              description: Correlation ID for tracing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Cannot delete project with existing tasks/milestones/expenses
                correlation_id: 123e4567-e89b-12d3-a456-426614174000
        '500':
          $ref: '#/components/responses/InternalServerError'
  /{version}/projects/{project_id}/tasks:
    post:
      summary: Create task
      description: Create a new task within a project
      operationId: createTask
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/ProjectIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Circular dependency in predecessors
          headers:
            X-Correlation-ID:
              schema:
                type: string
              description: Correlation ID for tracing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: List tasks
      description: Retrieve paginated list of tasks for a project
      operationId: listTasks
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/ProjectIdPathParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: parent_id
          in: query
          description: Filter by parent task (use "null" for top-level tasks)
          schema:
            type: string
            format: uuid
        - name: is_milestone
          in: query
          description: Filter milestones only
          schema:
            type: boolean
        - name: is_summary
          in: query
          description: Filter summary tasks only
          schema:
            type: boolean
        - name: is_critical
          in: query
          description: Filter critical path tasks only
          schema:
            type: boolean
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum:
              - not_started
              - in_progress
              - completed
              - cancelled
        - name: search
          in: query
          description: Search in name field
          schema:
            type: string
        - name: sort_by
          in: query
          description: Sort field
          schema:
            type: string
            enum:
              - wbs
              - name
              - start
              - finish
            default: wbs
        - name: sort_order
          in: query
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
        '200':
          description: Successful response with task list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /{version}/projects/{project_id}/tasks/bulk:
    post:
      summary: Bulk create tasks
      description: Create multiple tasks in a single request (for efficient import)
      operationId: bulkCreateTasks
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/ProjectIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskBulkCreate'
      responses:
        '201':
          description: Tasks created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskBulkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /{version}/projects/{project_id}/tasks/sync:
    put:
      summary: Sync tasks (upsert for reimport)
      description: |
        Update existing tasks during MS Project reimport. Uses ms_project_uid as reconciliation key.
        Only updates planning fields (dates, duration, predecessors), preserves tracking data
        (actual dates, progress, RAE).
      operationId: syncTasks
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/ProjectIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskSync'
      responses:
        '200':
          description: Tasks synchronized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSyncResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /{version}/projects/{project_id}/tasks/{id}:
    get:
      summary: Get task
      description: Retrieve a single task by ID
      operationId: getTask
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/ProjectIdPathParam'
        - $ref: '#/components/parameters/TaskIdParam'
      responses:
        '200':
          description: Successful response with task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: Update task
      description: Update an existing task (partial update)
      operationId: updateTask
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/ProjectIdPathParam'
        - $ref: '#/components/parameters/TaskIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Circular dependency in predecessors
          headers:
            X-Correlation-ID:
              schema:
                type: string
              description: Correlation ID for tracing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete task
      description: Delete a task (cascades to assignments and child tasks)
      operationId: deleteTask
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/ProjectIdPathParam'
        - $ref: '#/components/parameters/TaskIdParam'
      responses:
        '204':
          description: Task deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Task is referenced by other tasks as predecessor
          headers:
            X-Correlation-ID:
              schema:
                type: string
              description: Correlation ID for tracing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /{version}/projects/{project_id}/milestones:
    post:
      summary: Create milestone
      description: Create a new milestone for a project. The sum of budget_weight across all project milestones must equal 1.0.
      operationId: createMilestone
      tags:
        - Milestones
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/ProjectIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MilestoneCreate'
            examples:
              rqf_milestone:
                summary: Requirements Qualification Review
                value:
                  name: RQF - Requirements Qualification Review
                  description: Formal review of requirements specification
                  target_date: '2027-01-22T18:00:00Z'
                  budget_weight: 0.15
      responses:
        '201':
          description: Milestone created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MilestoneResponse'
              example:
                data:
                  id: d4e5f6a7-b8c9-4d5e-1f2a-3b4c5d6e7f8a
                  project_id: a1b2c3d4-e5f6-4a5b-8c9d-0e1f2a3b4c5d
                  name: RQF - Requirements Qualification Review
                  description: Formal review of requirements specification
                  target_date: '2027-01-22T18:00:00Z'
                  actual_date: null
                  status: upcoming
                  budget_weight: 0.15
                  is_achieved: false
                  achieved_date: null
                  created_at: '2026-01-11T10:00:00Z'
                  updated_at: '2026-01-11T10:00:00Z'
                message: Milestone created successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict - Milestone overlaps or budget_weight sum exceeds 1.0
          headers:
            X-Correlation-ID:
              schema:
                type: string
              description: Correlation ID for tracing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: 'Sum of milestone budget_weight would exceed 1.0 (current: 0.90, adding: 0.15)'
                correlation_id: 123e4567-e89b-12d3-a456-426614174000
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: List milestones
      description: Retrieve all milestones for a project with optional filtering
      operationId: listMilestones
      tags:
        - Milestones
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/ProjectIdPathParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: status
          in: query
          schema:
            type: string
            enum:
              - upcoming
              - achieved
              - missed
          description: Filter by milestone status
        - name: target_date_from
          in: query
          schema:
            type: string
            format: date-time
          description: Filter milestones with target_date >= this value
        - name: target_date_to
          in: query
          schema:
            type: string
            format: date-time
          description: Filter milestones with target_date <= this value
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Milestones retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MilestoneList'
              example:
                data:
