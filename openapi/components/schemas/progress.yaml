ProgressUpdateEntry:
  type: object
  required: [task_id, percent_complete]
  properties:
    task_id:
      type: string
      format: uuid
      description: Task identifier to update
    percent_complete:
      type: integer
      minimum: 0
      maximum: 100
      description: Progress percentage (0-100)
    comment:
      type: string
      maxLength: 255
      description: Optional progress comment

ProgressUpdateRequest:
  type: object
  required: [date, updates]
  properties:
    date:
      type: string
      format: date-time
      description: Progress reporting date (supports backdated entries)
    updates:
      type: array
      minItems: 1
      items:
        $ref: '#/ProgressUpdateEntry'
      description: List of task progress updates

ProgressUpdateResultItem:
  type: object
  required: [task_id, task_name, previous_percent_complete, new_percent_complete, status_changed]
  properties:
    task_id:
      type: string
      format: uuid
      description: Updated task identifier
    task_name:
      type: string
      description: Task name
    previous_percent_complete:
      type: integer
      minimum: 0
      maximum: 100
      description: Percent complete before update
    new_percent_complete:
      type: integer
      minimum: 0
      maximum: 100
      description: Percent complete after update
    status_changed:
      type: boolean
      description: Indicates if status changed based on percent_complete
    new_status:
      type: string
      enum: [not_started, in_progress, completed, cancelled]
      description: New status when status_changed is true

ProgressUpdateError:
  type: object
  required: [task_id, error]
  properties:
    task_id:
      type: string
      format: uuid
      description: Task that failed to update
    error:
      type: string
      description: Reason for failure

ProgressUpdateData:
  type: object
  required: [project_id, date, updated_count, failed_count]
  properties:
    project_id:
      type: string
      format: uuid
      description: Project identifier
    date:
      type: string
      format: date-time
      description: Progress reporting date
    updated_count:
      type: integer
      minimum: 0
      description: Number of successful updates
    failed_count:
      type: integer
      minimum: 0
      description: Number of failed updates
    updates:
      type: array
      items:
        $ref: '#/ProgressUpdateResultItem'
      description: Details for successful updates
    errors:
      type: array
      items:
        $ref: '#/ProgressUpdateError'
      description: Errors for failed updates

ProgressUpdateResponse:
  type: object
  required: [data]
  properties:
    data:
      $ref: '#/ProgressUpdateData'
    message:
      type: string
      description: Optional success message

ProgressHistoryItem:
  type: object
  required: [id, project_id, task_id, task_name, date, previous_percent_complete, new_percent_complete, delta, updated_by, created_at]
  properties:
    id:
      type: string
      format: uuid
      description: Progress history entry identifier
    project_id:
      type: string
      format: uuid
      description: Project identifier
    task_id:
      type: string
      format: uuid
      description: Task identifier
    task_name:
      type: string
      description: Task name
    date:
      type: string
      format: date-time
      description: Reporting date for the update
    previous_percent_complete:
      type: integer
      minimum: 0
      maximum: 100
      description: Percent complete before update
    new_percent_complete:
      type: integer
      minimum: 0
      maximum: 100
      description: Percent complete after update
    delta:
      type: integer
      description: Difference between previous and new percent_complete
    comment:
      type: string
      maxLength: 255
      description: Optional comment supplied during update
    updated_by:
      type: string
      format: uuid
      description: User who performed the update (from JWT)
    created_at:
      type: string
      format: date-time
      description: Timestamp when the update was recorded

ProgressHistoryResponse:
  type: object
  required: [data, page, per_page, total, total_pages]
  properties:
    data:
      type: array
      items:
        $ref: '#/ProgressHistoryItem'
    page:
      type: integer
      minimum: 1
    per_page:
      type: integer
      minimum: 1
      maximum: 100
    total:
      type: integer
      minimum: 0
    total_pages:
      type: integer
      minimum: 0
