EVMIndicators:
  type: object
  properties:
    project_id:
      type: string
      format: uuid
    as_of_date:
      type: string
      format: date-time
      description: Date for which EVM indicators are calculated
    bac:
      type: number
      format: double
      description: Budget At Completion
    pv:
      type: number
      format: double
      description: Planned Value / BCWS
    ac:
      type: number
      format: double
      description: Actual Cost / ACWP
    ev_physical:
      type: number
      format: double
      description: Earned Value (physical progress method - RAE-based)
    ev_milestone:
      type: number
      format: double
      description: Earned Value (milestone completion method)
    cv_physical:
      type: number
      format: double
      description: Cost Variance (EV - AC) using physical method
    sv_physical:
      type: number
      format: double
      description: Schedule Variance (EV - PV) using physical method
    cpi_physical:
      type: number
      format: double
      description: Cost Performance Index (EV / AC) using physical method
    spi_physical:
      type: number
      format: double
      description: Schedule Performance Index (EV / PV) using physical method
    eac_cpi_physical:
      type: number
      format: double
      description: Estimate At Completion using CPI method (BAC / CPI)
    etc_physical:
      type: number
      format: double
      description: Estimate To Complete (EAC - AC)
    vac_physical:
      type: number
      format: double
      description: Variance At Completion (BAC - EAC)

EVMTimeSeries:
  type: object
  properties:
    project_id:
      type: string
      format: uuid
    start_date:
      type: string
      format: date-time
    end_date:
      type: string
      format: date-time
    granularity:
      type: string
      enum: [monthly, quarterly, yearly]
    data:
      type: object
      description: ECharts-compatible time series data
      properties:
        dates:
          type: array
          items:
            type: string
            format: date
          description: Date labels (YYYY-MM-DD)
        pv:
          type: array
          items:
            type: number
          description: Planned Value over time
        ac:
          type: array
          items:
            type: number
          description: Actual Cost over time
        ev:
          type: array
          items:
            type: number
          description: Earned Value over time

EVMForecasts:
  type: object
  properties:
    project_id:
      type: string
      format: uuid
    as_of_date:
      type: string
      format: date-time
    bac:
      type: number
      format: double
    ac:
      type: number
      format: double
    forecasts:
      type: object
      description: Multiple EAC calculation methods
      properties:
        cpi_method:
          type: object
          properties:
            eac:
              type: number
              format: double
              description: EAC = BAC / CPI
            etc:
              type: number
              format: double
              description: ETC = EAC - AC
            vac:
              type: number
              format: double
              description: VAC = BAC - EAC
        cpi_spi_method:
          type: object
          properties:
            eac:
              type: number
              format: double
              description: EAC = AC + (BAC - EV) / (CPI × SPI)
            etc:
              type: number
              format: double
            vac:
              type: number
              format: double
        plan_based:
          type: object
          properties:
            eac:
              type: number
              format: double
              description: EAC = AC + Remaining_PV
            etc:
              type: number
              format: double
            vac:
              type: number
              format: double

ExpenseBreakdown:
  type: object
  required: [data]
  properties:
    data:
      type: object
      required: [project_id, total_expenses, breakdown]
      properties:
        project_id:
          type: string
          format: uuid
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        total_expenses:
          type: number
          format: double
          description: Total expenses across all categories
        breakdown:
          type: array
          items:
            type: object
            required: [category, amount, percentage]
            properties:
              category:
                type: string
                enum: [labor, procurement, subcontracting, overhead]
              amount:
                type: number
                format: double
              percentage:
                type: number
                format: double
              count:
                type: integer
                description: Number of expense records

LaborByResource:
  type: object
  required: [data]
  properties:
    data:
      type: object
      required: [project_id, total_labor_cost, resource_count, breakdown]
      properties:
        project_id:
          type: string
          format: uuid
        total_labor_cost:
          type: number
          format: double
          description: Total labor cost across all resources
          example: 450000.00
        resource_count:
          type: integer
          minimum: 0
          description: Total number of resources
          example: 25
        breakdown:
          type: array
          items:
            type: object
            required: [resource_id, resource_name, amount, percentage]
            properties:
              resource_id:
                type: string
                format: uuid
              resource_name:
                type: string
                example: "Jean Dupont"
              amount:
                type: number
                format: double
                description: Total labor cost for this resource
                example: 85000.00
              percentage:
                type: number
                format: double
                description: Percentage of total labor cost
                example: 18.89
              hours:
                type: number
                format: double
                description: Total hours worked
                example: 1000.0
              average_rate:
                type: number
                format: double
                description: Average hourly rate
                example: 85.00
        echarts_format:
          type: object
          description: ECharts-compatible bar chart configuration
          properties:
            xAxis:
              type: object
              properties:
                type:
                  type: string
                  enum: [category]
                data:
                  type: array
                  items:
                    type: string
                  description: Resource names
                  example: ["Jean Dupont", "Marie Martin", "Pierre Bernard"]
            yAxis:
              type: object
              properties:
                type:
                  type: string
                  enum: [value]
                name:
                  type: string
                  example: "Cost (€)"
            series:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    example: "Labor Cost"
                  type:
                    type: string
                    enum: [bar]
                  data:
                    type: array
                    items:
                      type: number
                    example: [85000.00, 72000.00, 65000.00]

MonthlyExpenses:
  type: object
  required: [data]
  properties:
    data:
      type: object
      required: [project_id, monthly_data]
      properties:
        project_id:
          type: string
          format: uuid
        start_date:
          type: string
          format: date-time
          description: Start date of the period
        end_date:
          type: string
          format: date-time
          description: End date of the period
        cumulative:
          type: boolean
          default: false
          description: Whether values are cumulative or period-based
        monthly_data:
          type: array
          items:
            type: object
            required: [month, total]
            properties:
              month:
                type: string
                pattern: '^\d{4}-\d{2}$'
                description: Month in YYYY-MM format
                example: "2024-11"
              total:
                type: number
                format: double
                description: Total expenses for the month
                example: 48000.00
              labor:
                type: number
                format: double
                description: Labor expenses
                example: 25000.00
              subcontracting:
                type: number
                format: double
                description: Subcontracting expenses
                example: 15000.00
              procurement:
                type: number
                format: double
                description: Procurement expenses
                example: 6000.00
              overhead:
                type: number
                format: double
                description: Overhead expenses
                example: 2000.00
        echarts_format:
          type: object
          description: ECharts-compatible stacked bar chart configuration
          properties:
            xAxis:
              type: object
              properties:
                type:
                  type: string
                  enum: [category]
                data:
                  type: array
                  items:
                    type: string
                  description: Months in YYYY-MM format
                  example: ["2024-11", "2024-12", "2025-01"]
            yAxis:
              type: object
              properties:
                type:
                  type: string
                  enum: [value]
                name:
                  type: string
                  example: "Expenses (€)"
            series:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    enum: [Labor, Subcontracting, Procurement, Overhead]
                  type:
                    type: string
                    enum: [bar, line]
                  stack:
                    type: string
                    example: "total"
                  data:
                    type: array
                    items:
                      type: number
                    example: [25000, 42000, 45000]
