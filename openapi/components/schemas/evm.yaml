EVMIndicators:
  type: object
  required: [project_id, as_of_date, calculation_timestamp]
  properties:
    project_id:
      type: string
      format: uuid
    as_of_date:
      type: string
      format: date-time
      description: Date for which EVM indicators are calculated
    calculation_timestamp:
      type: string
      format: date-time
      description: Timestamp when indicators were computed
    bac:
      type: number
      format: double
      description: Budget At Completion
    pv:
      type: number
      format: double
      description: Planned Value / BCWS
    ac:
      type: number
      format: double
      description: Actual Cost / ACWP
    ev_physical:
      type: number
      format: double
      description: Earned Value (physical progress method - RAE-based)
    ev_milestone:
      type: number
      format: double
      description: Earned Value (milestone completion method)
    cv_physical:
      type: number
      format: double
      description: Cost Variance (EV - AC) using physical method
    cv_milestone:
      type: number
      format: double
      description: Cost Variance (EV - AC) using milestone method
    sv_physical:
      type: number
      format: double
      description: Schedule Variance (EV - PV) using physical method
    sv_milestone:
      type: number
      format: double
      description: Schedule Variance (EV - PV) using milestone method
    cpi_physical:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: Cost Performance Index (EV / AC) using physical method
    cpi_milestone:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: Cost Performance Index (EV / AC) using milestone method
    spi_physical:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: Schedule Performance Index (EV / PV) using physical method
    spi_milestone:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: Schedule Performance Index (EV / PV) using milestone method
    eac_cpi_physical:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: Estimate At Completion using CPI method (BAC / CPI)
    eac_cpi_milestone:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: Estimate At Completion using CPI method (milestone)
    eac_cpi_spi_physical:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: Estimate At Completion using CPI×SPI method (physical)
    eac_cpi_spi_milestone:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: Estimate At Completion using CPI×SPI method (milestone)
    eac_plan_based:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: Estimate At Completion using plan-based method
    etc_cpi_physical:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: ETC using CPI method (physical)
    etc_cpi_milestone:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: ETC using CPI method (milestone)
    etc_cpi_spi_physical:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: ETC using CPI×SPI method (physical)
    etc_cpi_spi_milestone:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: ETC using CPI×SPI method (milestone)
    etc_plan_based:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: ETC using plan-based method
    vac_cpi_physical:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: VAC using CPI method (physical)
    vac_cpi_milestone:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: VAC using CPI method (milestone)
    vac_cpi_spi_physical:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: VAC using CPI×SPI method (physical)
    vac_cpi_spi_milestone:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: VAC using CPI×SPI method (milestone)
    vac_plan_based:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: VAC using plan-based method
    etc_physical:
      deprecated: true
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: Estimate To Complete (EAC - AC)
    vac_physical:
      deprecated: true
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: Variance At Completion (BAC - EAC)
    percent_complete_physical:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: Completion percentage using physical method
    percent_complete_milestone:
      anyOf:
        - type: number
          format: double
        - type: 'null'
      description: Completion percentage using milestone method

EVMIndicatorsResponse:
  type: object
  required: [data]
  properties:
    data:
      $ref: '#/EVMIndicators'

EVMTimeSeries:
  type: object
  required: [project_id, start_date, end_date, granularity, ev_method, cumulative, series]
  properties:
    project_id:
      type: string
      format: uuid
    start_date:
      type: string
      format: date-time
    end_date:
      type: string
      format: date-time
    granularity:
      type: string
      enum: [month, week, day]
      description: Data point frequency
    ev_method:
      type: string
      enum: [physical, milestone]
      description: EV calculation method used to compute EV
    cumulative:
      type: boolean
      description: Whether values are cumulative (true) or period-based (false)
    series:
      type: array
      description: Time series points for visualization
      items:
        $ref: '#/EVMTimeSeriesPoint'
    echarts_format:
      $ref: '#/EVMTimeSeriesEChartsFormat'

EVMTimeSeriesEChartsFormat:
  type: object
  description: ECharts-compatible line chart configuration (minimal contract)
  properties:
    xAxis:
      type: object
      properties:
        type:
          type: string
          enum: [category]
        data:
          type: array
          items:
            type: string
          description: Labels, e.g. YYYY-MM
    series:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            enum: [PV, AC, EV]
          type:
            type: string
            enum: [line]
          data:
            type: array
            items:
              type: number

EVMTimeSeriesPoint:
  type: object
  required: [date, pv, ac, ev]
  properties:
    date:
      type: string
      format: date-time
      description: Date of the data point (typically period end)
    pv:
      type: number
      format: double
    ac:
      type: number
      format: double
    ev:
      type: number
      format: double
    cv:
      anyOf:
        - type: number
          format: double
        - type: 'null'
    sv:
      anyOf:
        - type: number
          format: double
        - type: 'null'
    cpi:
      anyOf:
        - type: number
          format: double
        - type: 'null'
    spi:
      anyOf:
        - type: number
          format: double
        - type: 'null'

EVMTimeSeriesResponse:
  type: object
  required: [data]
  properties:
    data:
      $ref: '#/EVMTimeSeries'

EVMForecasts:
  type: object
  required: [project_id, as_of_date, bac, current_ac, current_ev, current_pv, remaining_pv, forecasts]
  properties:
    project_id:
      type: string
      format: uuid
    as_of_date:
      type: string
      format: date-time
    bac:
      type: number
      format: double
    current_ac:
      type: number
      format: double
    current_ev:
      type: number
      format: double
    current_pv:
      type: number
      format: double
    remaining_pv:
      type: number
      format: double
    cpi:
      anyOf:
        - type: number
          format: double
        - type: 'null'
    spi:
      anyOf:
        - type: number
          format: double
        - type: 'null'
    forecasts:
      type: array
      items:
        $ref: '#/EVMForecastItem'
    recommended_method:
      type: string
      description: Recommended forecast method
    recommendation_reason:
      type: string
      description: Rationale for recommended_method

EVMForecastItem:
  type: object
  required: [method, eac, etc, vac]
  properties:
    method:
      type: string
      enum: [cpi, cpi_spi, plan_based]
    description:
      type: string
    formula:
      type: string
    eac:
      type: number
      format: double
    etc:
      type: number
      format: double
    vac:
      type: number
      format: double
    confidence:
      type: string
      enum: [low, medium, high]
    use_case:
      type: string

EVMForecastsResponse:
  type: object
  required: [data]
  properties:
    data:
      $ref: '#/EVMForecasts'

ExpenseBreakdown:
  type: object
  required: [data]
  properties:
    data:
      type: object
      required: [project_id, total_expenses, breakdown]
      properties:
        project_id:
          type: string
          format: uuid
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        total_expenses:
          type: number
          format: double
          description: Total expenses across all categories
        breakdown:
          type: array
          items:
            type: object
            required: [category, amount, percentage]
            properties:
              category:
                type: string
                enum: [labor, procurement, subcontracting, overhead]
              amount:
                type: number
                format: double
              percentage:
                type: number
                format: double
              count:
                type: integer
                description: Number of expense records
        echarts_format:
          type: object
          description: ECharts-compatible pie/donut chart configuration
          properties:
            series:
              type: array
              items:
                type: object
                required: [name, type, data]
                properties:
                  name:
                    type: string
                  type:
                    type: string
                    enum: [pie]
                  radius:
                    type: array
                    items:
                      type: string
                    description: Pie/donut radius (e.g. ["40%", "70%"])
                  data:
                    type: array
                    items:
                      type: object
                      required: [value, name]
                      properties:
                        value:
                          type: number
                          format: double
                        name:
                          type: string

LaborByResource:
  type: object
  required: [data]
  properties:
    data:
      type: object
      required: [project_id, total_labor_cost, resource_count, breakdown]
      properties:
        project_id:
          type: string
          format: uuid
        total_labor_cost:
          type: number
          format: double
          description: Total labor cost across all resources
          example: 450000.00
        resource_count:
          type: integer
          minimum: 0
          description: Total number of resources
          example: 25
        breakdown:
          type: array
          items:
            type: object
            required: [resource_id, resource_name, amount, percentage]
            properties:
              resource_id:
                type: string
                format: uuid
              resource_name:
                type: string
                example: "Jean Dupont"
              amount:
                type: number
                format: double
                description: Total labor cost for this resource
                example: 85000.00
              percentage:
                type: number
                format: double
                description: Percentage of total labor cost
                example: 18.89
              hours:
                type: number
                format: double
                description: Total hours worked
                example: 1000.0
              average_rate:
                type: number
                format: double
                description: Average hourly rate
                example: 85.00
        echarts_format:
          type: object
          description: ECharts-compatible bar chart configuration
          properties:
            xAxis:
              type: object
              properties:
                type:
                  type: string
                  enum: [category]
                data:
                  type: array
                  items:
                    type: string
                  description: Resource names
                  example: ["Jean Dupont", "Marie Martin", "Pierre Bernard"]
            yAxis:
              type: object
              properties:
                type:
                  type: string
                  enum: [value]
                name:
                  type: string
                  example: "Cost (€)"
            series:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    example: "Labor Cost"
                  type:
                    type: string
                    enum: [bar]
                  data:
                    type: array
                    items:
                      type: number
                    example: [85000.00, 72000.00, 65000.00]

MonthlyExpenses:
  type: object
  required: [data]
  properties:
    data:
      type: object
      required: [project_id, monthly_data]
      properties:
        project_id:
          type: string
          format: uuid
        start_date:
          type: string
          format: date-time
          description: Start date of the period
        end_date:
          type: string
          format: date-time
          description: End date of the period
        cumulative:
          type: boolean
          default: false
          description: Whether values are cumulative or period-based
        monthly_data:
          type: array
          items:
            type: object
            required: [month, total]
            properties:
              month:
                type: string
                pattern: '^\d{4}-\d{2}$'
                description: Month in YYYY-MM format
                example: "2024-11"
              total:
                type: number
                format: double
                description: Total expenses for the month
                example: 48000.00
              labor:
                type: number
                format: double
                description: Labor expenses
                example: 25000.00
              subcontracting:
                type: number
                format: double
                description: Subcontracting expenses
                example: 15000.00
              procurement:
                type: number
                format: double
                description: Procurement expenses
                example: 6000.00
              overhead:
                type: number
                format: double
                description: Overhead expenses
                example: 2000.00
        echarts_format:
          type: object
          description: ECharts-compatible stacked bar chart configuration
          properties:
            xAxis:
              type: object
              properties:
                type:
                  type: string
                  enum: [category]
                data:
                  type: array
                  items:
                    type: string
                  description: Months in YYYY-MM format
                  example: ["2024-11", "2024-12", "2025-01"]
            yAxis:
              type: object
              properties:
                type:
                  type: string
                  enum: [value]
                name:
                  type: string
                  example: "Expenses (€)"
            series:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    enum: [Labor, Subcontracting, Procurement, Overhead]
                  type:
                    type: string
                    enum: [bar, line]
                  stack:
                    type: string
                    example: "total"
                  data:
                    type: array
                    items:
                      type: number
                    example: [25000, 42000, 45000]
