Error:
  type: object
  required:
    - message
  properties:
    message:
      type: string
      description: Human-readable error message
    errors:
      type: object
      additionalProperties: true
      description: Field-specific error details
    correlation_id:
      type: string
      format: uuid
      description: Correlation ID for tracing
  example:
    message: "Validation failed"
    errors:
      name: ["Name is required"]
    correlation_id: "123e4567-e89b-12d3-a456-426614174000"

PaginatedMeta:
  type: object
  required:
    - page
    - per_page
    - total
    - total_pages
  properties:
    page:
      type: integer
      minimum: 1
    per_page:
      type: integer
      minimum: 1
      maximum: 100
    total:
      type: integer
      minimum: 0
    total_pages:
      type: integer
      minimum: 0

Timestamps:
  type: object
  properties:
    created_at:
      type: string
      format: date-time
      description: Record creation timestamp
      readOnly: true
    updated_at:
      type: string
      format: date-time
      description: Record last update timestamp
      readOnly: true
