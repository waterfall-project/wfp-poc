BadRequest:
  description: Invalid request parameters or body
  headers:
    X-Correlation-ID:
      schema:
        type: string
      description: Correlation ID for tracing
  content:
    application/json:
      schema:
        $ref: './schemas/common.yaml#/Error'
      example:
        error: "Bad Request"
        message: "Validation failed"
        errors:
          start_date: ["Start date must be before finish date"]
        correlation_id: "123e4567-e89b-12d3-a456-426614174000"

Unauthorized:
  description: Authentication required or invalid token
  headers:
    X-Correlation-ID:
      schema:
        type: string
      description: Correlation ID for tracing
  content:
    application/json:
      schema:
        $ref: './schemas/common.yaml#/Error'
      example:
        error: "Unauthorized"
        message: "Invalid or expired token"
        correlation_id: "123e4567-e89b-12d3-a456-426614174000"

Forbidden:
  description: Insufficient permissions
  headers:
    X-Correlation-ID:
      schema:
        type: string
      description: Correlation ID for tracing
  content:
    application/json:
      schema:
        $ref: './schemas/common.yaml#/Error'
      example:
        error: "Forbidden"
        message: "Insufficient Guardian permissions for this operation"
        correlation_id: "123e4567-e89b-12d3-a456-426614174000"

NotFound:
  description: Resource not found
  headers:
    X-Correlation-ID:
      schema:
        type: string
      description: Correlation ID for tracing
  content:
    application/json:
      schema:
        $ref: './schemas/common.yaml#/Error'
      example:
        error: "Not Found"
        message: "Resource not found"
        correlation_id: "123e4567-e89b-12d3-a456-426614174000"

Conflict:
  description: Conflict with current state of resource
  headers:
    X-Correlation-ID:
      schema:
        type: string
      description: Correlation ID for tracing
  content:
    application/json:
      schema:
        $ref: './schemas/common.yaml#/Error'
      example:
        error: "Conflict"
        message: "Conflict with existing resource state"
        correlation_id: "123e4567-e89b-12d3-a456-426614174000"

UnprocessableEntity:
  description: Business logic error
  headers:
    X-Correlation-ID:
      schema:
        type: string
      description: Correlation ID for tracing
  content:
    application/json:
      schema:
        $ref: './schemas/common.yaml#/Error'
      example:
        error: "Unprocessable Entity"
        message: "Start date must be before finish date"
        correlation_id: "123e4567-e89b-12d3-a456-426614174000"

TooManyRequests:
  description: Rate limit exceeded
  headers:
    X-Correlation-ID:
      schema:
        type: string
      description: Correlation ID for tracing
    Retry-After:
      schema:
        type: integer
      description: Seconds until rate limit resets
    X-RateLimit-Reset:
      schema:
        type: integer
      description: Unix timestamp when rate limit resets
  content:
    application/json:
      schema:
        $ref: './schemas/common.yaml#/Error'
      example:
        error: "Too Many Requests"
        message: "Rate limit exceeded. Maximum 10 requests per minute."
        correlation_id: "123e4567-e89b-12d3-a456-426614174000"

InternalServerError:
  description: Internal server error
  headers:
    X-Correlation-ID:
      schema:
        type: string
      description: Correlation ID for tracing
  content:
    application/json:
      schema:
        $ref: './schemas/common.yaml#/Error'
      example:
        error: "Internal Server Error"
        message: "An unexpected error occurred"
        correlation_id: "123e4567-e89b-12d3-a456-426614174000"
